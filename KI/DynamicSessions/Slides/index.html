<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code Interpreter</title>
    <link rel="preconnect" href="/" />
  </head>
  <body>
    <main id="stage" class="stage">
      <header class="chrome chrome-top">
        <div class="chrome-id">
          <span class="chrome-id-dot"></span>
          <span>scenario &nbsp;/&nbsp; <span class="scen-num">01</span></span>
        </div>
        <div class="chrome-title">
          <span class="title-kicker">
            <span class="kicker-s1">Analyzing large data with a</span>
            <span class="kicker-s2">Generating test data with a</span>
          </span>
          <span class="title-main"><em>Code Interpreter</em></span>
        </div>
        <div class="chrome-approach">
          <span class="approach approach-1">
            <span class="approach-num">01</span>
            <span class="approach-label">Send&nbsp;everything</span>
          </span>
          <span class="approach approach-2">
            <span class="approach-num">02</span>
            <span class="approach-label">Ship&nbsp;the&nbsp;code, not the data</span>
          </span>
        </div>
      </header>

      <section class="canvas-wrap">
        <svg
          class="canvas"
          viewBox="0 0 1600 820"
          preserveAspectRatio="xMidYMid meet"
          aria-hidden="true"
        >
          <defs>
            <!-- reusable glyphs -->
            <symbol id="sym-csv" viewBox="-80 -100 160 200">
              <g class="doc">
                <path class="doc-body" d="M -64 -84 L 40 -84 L 64 -60 L 64 84 L -64 84 Z" />
                <path class="doc-fold" d="M 40 -84 L 40 -60 L 64 -60" />
                <text class="doc-label" x="0" y="-44" text-anchor="middle">customers.csv</text>
                <text class="doc-size" x="0" y="-26" text-anchor="middle">2.3 GB · 14M</text>
                <g class="doc-rows">
                  <rect x="-48" y="-8" width="92" height="4" />
                  <rect x="-48" y="4"  width="74" height="4" />
                  <rect x="-48" y="16" width="86" height="4" />
                  <rect x="-48" y="28" width="60" height="4" />
                </g>
                <g class="doc-pii">
                  <rect x="-48" y="50" width="44" height="20" rx="3" />
                  <text x="-26" y="64" text-anchor="middle">PII</text>
                </g>
              </g>
            </symbol>

            <symbol id="sym-script" viewBox="-60 -80 120 160">
              <g class="doc doc-script">
                <path class="doc-body" d="M -44 -64 L 28 -64 L 44 -48 L 44 64 L -44 64 Z" />
                <path class="doc-fold" d="M 28 -64 L 28 -48 L 44 -48" />
                <text class="doc-label" x="0" y="-26" text-anchor="middle">prog.py</text>
                <g class="doc-code">
                  <rect x="-34" y="-14" width="10" height="3" />
                  <rect x="-20" y="-14" width="40" height="3" />
                  <rect x="-34" y="-4" width="14" height="3" />
                  <rect x="-16" y="-4" width="36" height="3" />
                  <rect x="-28" y="6" width="50" height="3" />
                  <rect x="-34" y="16" width="8" height="3" />
                  <rect x="-22" y="16" width="28" height="3" />
                  <rect x="-34" y="26" width="32" height="3" />
                  <rect x="0" y="26" width="20" height="3" />
                  <rect x="-34" y="36" width="18" height="3" />
                </g>
              </g>
            </symbol>

            <!-- dotted grid pattern -->
            <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
              <circle cx="0" cy="0" r="1" class="grid-dot" />
            </pattern>

            <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="6" result="b" />
              <feMerge>
                <feMergeNode in="b" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
          </defs>

          <rect class="grid" x="0" y="0" width="1600" height="820" fill="url(#dots)" />

          <!-- ======== DATABASE (left) ======== -->
          <g class="db" transform="translate(220, 410)">
            <g class="db-stack">
              <ellipse class="db-top" cx="0" cy="-90" rx="96" ry="26" />
              <path class="db-side" d="M -96 -90 L -96 90 A 96 26 0 0 0 96 90 L 96 -90" />
              <ellipse class="db-top db-top-ring" cx="0" cy="-90" rx="96" ry="26" />
              <path class="db-ring" d="M -96 -40 A 96 26 0 0 0 96 -40" />
              <path class="db-ring" d="M -96 10 A 96 26 0 0 0 96 10" />
            </g>
            <text class="db-label" x="0" y="160" text-anchor="middle">internal · warehouse</text>
          </g>

          <!-- CSV: starts inside DB, moves around -->
          <g class="csv-layer">
            <use class="csv" href="#sym-csv" x="-80" y="-100" width="160" height="200" />
          </g>

          <!-- metadata card -->
          <g class="meta-layer">
            <g class="meta-card">
              <rect class="meta-bg" x="-90" y="-60" width="180" height="120" rx="8" />
              <text class="meta-title" x="-78" y="-38">metadata.json</text>
              <line class="meta-sep" x1="-78" y1="-28" x2="78" y2="-28" />
              <g class="meta-rows">
                <text x="-78" y="-12">id</text>            <text class="t" x="78" y="-12" text-anchor="end">int64</text>
                <text x="-78" y="4">email</text>          <text class="t" x="78" y="4" text-anchor="end">&lt;hashed&gt;</text>
                <text x="-78" y="20">signup_at</text>     <text class="t" x="78" y="20" text-anchor="end">datetime</text>
                <text x="-78" y="36">region</text>        <text class="t" x="78" y="36" text-anchor="end">enum(12)</text>
                <text x="-78" y="52">revenue_usd</text>   <text class="t" x="78" y="52" text-anchor="end">float64</text>
              </g>
            </g>
          </g>

          <!-- prompt bubble -->
          <g class="prompt-layer">
            <g class="prompt">
              <rect class="prompt-bg" x="-210" y="-62" width="420" height="124" rx="62" />
              <text class="prompt-text prompt-text-a" x="0" y="10" text-anchor="middle">
                “Analyze this dataset”
              </text>
              <text class="prompt-text prompt-text-b" text-anchor="middle">
                <tspan class="hl-green" x="0" y="-8">“Write a script”</tspan>
                <tspan x="0" dy="1.25em">to analyze this dataset</tspan>
              </text>
              <text class="prompt-text prompt-text-c" x="0" y="10" text-anchor="middle">
                “Generate a large dataset”
              </text>
              <text class="prompt-text prompt-text-d" text-anchor="middle">
                <tspan class="hl-green" x="0" y="-8">“Write a script”</tspan>
                <tspan x="0" dy="1.25em">to generate test data</tspan>
              </text>
            </g>
          </g>

          <!-- ======== CLOUD (right) ======== -->
          <g class="cloud" transform="translate(1380, 330)">
            <path
              class="cloud-shape"
              d="M -150 30
                 C -190 30 -200 -20 -160 -34
                 C -170 -80 -110 -100 -78 -72
                 C -64 -110 4 -120 30 -88
                 C 60 -108 120 -86 120 -48
                 C 160 -40 158 18 120 30
                 Z"
            />
            <text class="cloud-label" x="-20" y="-8" text-anchor="middle">LLM</text>
            <text class="cloud-sub" x="-20" y="14" text-anchor="middle">frontier model</text>
          </g>

          <!-- error tags for approach 1 -->
          <g class="errors" transform="translate(1380, 330)">
            <g class="err err-1" transform="translate(-80, 80)">
              <rect x="-110" y="-16" width="220" height="32" rx="16" />
              <text x="0" y="6" text-anchor="middle">Context window exceeded</text>
            </g>
            <g class="err err-2" transform="translate(100, 130)">
              <rect x="-110" y="-16" width="220" height="32" rx="16" />
              <text x="0" y="6" text-anchor="middle">Sensitive data leaked</text>
            </g>
          </g>

          <!-- ======== SANDBOX (center) ======== -->
          <g class="sandbox" transform="translate(800, 430)">
            <rect class="sandbox-bg" x="-240" y="-170" width="480" height="340" rx="12" />
            <g class="sandbox-head">
              <text class="sandbox-title" x="-224" y="-140">sandbox · ephemeral container</text>
              <g class="sandbox-dots">
                <circle cx="208" cy="-146" r="4" />
                <circle cx="192" cy="-146" r="4" />
                <circle cx="176" cy="-146" r="4" />
              </g>
            </g>
          </g>

          <!-- script glyph (emitted from cloud) -->
          <g class="script-layer">
            <use class="script" href="#sym-script" x="-60" y="-80" width="120" height="160" />
          </g>

          <!-- result chart - placed AFTER csv/script layers so it draws on top inside the sandbox -->
          <g class="result-layer">
            <g class="result" transform="translate(800, 510)">
              <rect class="result-bg" x="-160" y="-80" width="320" height="160" rx="6" />
              <text class="result-title" x="-148" y="-58">revenue by region · FY24</text>
              <g class="bars">
                <rect class="bar" x="-140" y="-10" width="24" height="60" />
                <rect class="bar" x="-100" y="-24" width="24" height="74" />
                <rect class="bar" x="-60"  y="-40" width="24" height="90" />
                <rect class="bar" x="-20"  y="-18" width="24" height="68" />
                <rect class="bar" x="20"   y="-50" width="24" height="100" />
                <rect class="bar" x="60"   y="-12" width="24" height="62" />
                <rect class="bar" x="100"  y="-30" width="24" height="80" />
              </g>
              <line class="result-axis" x1="-148" y1="52" x2="148" y2="52" />
            </g>
          </g>

          <!-- final result-out (flies toward presenter) -->
          <g class="final-layer">
            <g class="final">
              <rect class="final-bg" x="-220" y="-90" width="440" height="180" rx="10" />
              <text class="final-title" x="0" y="-40" text-anchor="middle">Aggregated insights</text>
              <text class="final-sub" x="0" y="-12" text-anchor="middle">
                no raw data left the sandbox
              </text>
              <g class="final-mini">
                <rect x="-60" y="46" width="8" height="22" />
                <rect x="-44" y="40" width="8" height="28" />
                <rect x="-28" y="34" width="8" height="34" />
                <rect x="-12" y="44" width="8" height="24" />
                <rect x="4"   y="30" width="8" height="38" />
                <rect x="20"  y="42" width="8" height="26" />
                <rect x="36"  y="38" width="8" height="30" />
              </g>
            </g>
          </g>

          <!-- scenario 2: CSV generated by the LLM / inside the sandbox -->
          <g class="gen-csv-layer">
            <use class="csv gen-csv" href="#sym-csv" x="-80" y="-100" width="160" height="200" />
          </g>

          <!-- scenario 2: success card -->
          <g class="final-gen-layer">
            <g class="final">
              <rect class="final-bg" x="-240" y="-58" width="480" height="116" rx="10" />
              <text class="final-title" x="0" y="-12" text-anchor="middle">Data is ready</text>
              <text class="final-sub" x="0" y="22" text-anchor="middle">
                for further processing
              </text>
            </g>
          </g>

          <!-- connection arcs (drawn on the fly) -->
          <g class="arcs">
            <path class="arc arc-prompt-to-cloud"
                  d="M 420 370 C 800 200, 1100 200, 1260 330" />
            <path class="arc arc-cloud-to-sandbox"
                  d="M 1280 360 C 1100 520, 900 500, 800 430" />
            <path class="arc arc-db-to-sandbox"
                  d="M 320 420 C 500 520, 640 490, 720 450" />
          </g>
        </svg>
      </section>

      <footer class="chrome chrome-bottom">
        <div class="hints">
          <span class="key">Space</span><span class="key-label">next</span>
          <span class="key">←</span><span class="key-label">back</span>
          <span class="key">R</span><span class="key-label">reset</span>
        </div>
        <nav class="track" id="track" aria-label="step progress"></nav>
        <div class="counter">
          <span id="counter-current">01</span>
          <span class="counter-sep">/</span>
          <span id="counter-total">14</span>
        </div>
      </footer>

      <aside class="caption" id="caption" aria-live="polite"></aside>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
